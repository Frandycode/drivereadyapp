services:

  # ── FastAPI + GraphQL ───────────────────────────────────────────────────────
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/driveready
      REDIS_URL: redis://redis:6379/0
      JWT_SECRET: dev-secret-change-in-production
      JWT_ALGORITHM: HS256
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      STATE_CODE: ok
      ENVIRONMENT: development
      DEBUG: "true"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app        # hot reload — code changes reflect immediately
    command: uvicorn app.main:app --reload --host 0.0.0.0 --port 8000
    networks:
      - driveready

  # ── Celery Worker ───────────────────────────────────────────────────────────
  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/driveready
      REDIS_URL: redis://redis:6379/0
      JWT_SECRET: dev-secret-change-in-production
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      STATE_CODE: ok
      ENVIRONMENT: development
    depends_on:
      - db
      - redis
    volumes:
      - ./backend:/app
    command: celery -A app.tasks.celery_app worker -l info -Q default,ai
    networks:
      - driveready
    profiles:
      - full              # only starts with: docker compose --profile full up

  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: driveready
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d driveready"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - driveready

  # ── Redis ───────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - driveready

  # ── Adminer (Database GUI) ──────────────────────────────────────────────────
  adminer:
    image: adminer:latest
    ports:
      - "8080:8080"
    depends_on:
      - db
    networks:
      - driveready
    profiles:
      - tools             # only starts with: docker compose --profile tools up

volumes:
  postgres_data:

networks:
  driveready:
    driver: bridge
